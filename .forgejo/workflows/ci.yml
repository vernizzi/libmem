# libmem CI — runs on Forgejo Actions only.
#
# Lives in .forgejo/workflows/ (NOT .github/workflows/), so the GitHub push
# mirror carries the file but GitHub never executes it.
#
# Set the repo/org variable CI_IMAGE (Settings -> Actions -> Variables) to the
# toolchain image, e.g. git.example.com/<owner>/libmem-ci:latest. If that image
# is a public package, no registry login is needed.
name: ci

on:
  push:
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
      - 'fuzz/**'
      - '**/CMakeLists.txt'
      - 'cmake/**'
      - '.forgejo/workflows/**'
  pull_request:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    runs-on: docker
    container:
      image: "${{ vars.CI_IMAGE }}"
      credentials:
        username: "${{ github.repository_owner }}"
        password: "${{ secrets.REGISTRY_TOKEN }}"
    strategy:
      fail-fast: false
      matrix:
        cxx: [clang++, g++]
    env:
      ASAN_OPTIONS: detect_leaks=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: CXX=${{ matrix.cxx }} cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure

  fuzz-smoke:
    runs-on: docker
    container:
      image: "${{ vars.CI_IMAGE }}"
      credentials:
        username: "${{ github.repository_owner }}"
        password: "${{ secrets.REGISTRY_TOKEN }}"
    steps:
      - uses: actions/checkout@v4
      - name: Build fuzzers
        run: |
          CXX=clang++ cmake -G Ninja -B build-fuzz -DCMAKE_BUILD_TYPE=Debug -DBUILD_FUZZERS=ON
          cmake --build build-fuzz -j
      - name: Smoke-run multislab fuzzer
        run: ./build-fuzz/fuzz/fuzz_multislab -max_total_time=60 -print_final_stats=1
